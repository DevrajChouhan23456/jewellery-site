<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="120" viewBox="0 0 1200 120">
  <rect width="1200" height="120" fill="none"/>
  <g fill="none" stroke="#ffffff" stroke-opacity="0.35">
    <line x1="0" y1="10" x2="1200" y2="10"/>
    <line x1="0" y1="110" x2="1200" y2="110"/>
  </g>

  <!-- Simple monochrome “payment” badges (placeholder strip, matches screenshot vibe) -->
  <g font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="22" fill="#fff">
    <g transform="translate(10 25)">
      <rect width="150" height="70" rx="10" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.18"/>
      <text x="75" y="44" text-anchor="middle" dominant-baseline="middle" font-weight="700">VISA</text>
    </g>
    <g transform="translate(180 25)">
      <rect width="210" height="70" rx="10" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.18"/>
      <text x="105" y="44" text-anchor="middle" dominant-baseline="middle" font-weight="700">Mastercard</text>
    </g>
    <g transform="translate(410 25)">
      <rect width="150" height="70" rx="10" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.18"/>
      <text x="75" y="44" text-anchor="middle" dominant-baseline="middle" font-weight="700">RuPay</text>
    </g>
    <g transform="translate(580 25)">
      <rect width="170" height="70" rx="10" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.18"/>
      <text x="85" y="44" text-anchor="middle" dominant-baseline="middle" font-weight="700">PayPal</text>
    </g>
    <g transform="translate(770 25)">
      <rect width="200" height="70" rx="10" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.18"/>
      <text x="100" y="44" text-anchor="middle" dominant-baseline="middle" font-weight="700">Diners Club</text>
    </g>
    <g transform="translate(990 25)">
      <rect width="200" height="70" rx="10" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.18"/>
      <text x="100" y="44" text-anchor="middle" dominant-baseline="middle" font-weight="700">AmEx</text>
    </g>
  </g>
</svg>

